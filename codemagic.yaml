workflows:
  ios-unsigned-device:
    name: Lemonade Tycoon iOS Unsigned Device Build (For Sideloadly/Windows)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor platform
        script: |
          npx cap sync ios
      - name: Build unsigned device app
        script: |
          # Build targeting real iOS devices (iphoneos) but bypass signing
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build clean build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/Build/Products/Release-iphoneos/*.app

  ios-release:
    name: Lemonade Tycoon iOS Release Build (Requires Apple Developer Signing)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.kieuducha.lemonadeclone
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor platform
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          # Automatically uses provisioning profiles uploaded in Codemagic UI
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
